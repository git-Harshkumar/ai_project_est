{% extends 'base.html' %}
{% block content %}
  <!-- Loading overlay shown while analysing -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Analysing cell image…</p>
    </div>
  </div>

  <section class="upload-panel upload-centered">
    {% if error_message %}
      <div class="error-box">{{ error_message }}</div>
    {% endif %}
    <h2>Select a Cell Image</h2>
    <p class="upload-subtitle">Choose a blood cell image for instant malaria detection.</p>
    <form action="{{ url_for('result') }}" method="post" enctype="multipart/form-data" class="upload-form" id="uploadForm">
      <label class="file-field" id="dropZone">
        <span id="dropLabel"> Drag &amp; drop an image here, or click to select</span>
        <input type="file" name="image" accept="image/*" required id="imageInput">
      </label>
      <p class="field-hint">✓ Supported: PNG, JPG, JPEG, BMP, TIFF (Max 20MB)</p>
      <p class="file-name" id="fileName" style="display:none;">Selected: <strong></strong></p>
    </form>
  </section>

  <script>
    const dropZone   = document.getElementById("dropZone");
    const imageInput = document.getElementById("imageInput");
    const dropLabel  = document.getElementById("dropLabel");
    const fileName   = document.getElementById("fileName");
    const uploadForm = document.getElementById("uploadForm");
    const overlay    = document.getElementById("loadingOverlay");

    function submitForm() {
      dropLabel.textContent = "⏳ Uploading…";
      overlay.classList.add("active");
      uploadForm.submit();
    }

    function updateLabel() {
      if (imageInput.files.length > 0) {
        const file = imageInput.files[0];
        dropLabel.textContent = ` ${file.name} — starting analysis…`;
        fileName.style.display = "block";
        fileName.querySelector("strong").textContent = file.name;
        // Auto-submit after a short delay so the user sees the filename flash
        setTimeout(submitForm, 400);
      }
    }

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        event.stopPropagation();
        dropZone.classList.add("drag-active");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        event.stopPropagation();
        dropZone.classList.remove("drag-active");
      });
    });

    dropZone.addEventListener("drop", (event) => {
      const files = event.dataTransfer.files;
      if (files.length > 0) {
        imageInput.files = files;
        updateLabel();
      }
    });

    imageInput.addEventListener("change", updateLabel);
  </script>
{% endblock %}
