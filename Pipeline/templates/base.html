<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malaria Detector</title>
  <meta name="description"
    content="Upload a blood cell microscopy image and detect malaria instantly with our AI model.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="{{ url_for('index') }}" class="navbar-brand">
        <img
          src="/logo.png"
          alt="Malaria Detector Logo"
          class="navbar-logo-img">
        <span class="brand-text">
          Malaria <span class="brand-accent">Detector</span>
        </span>
      </a>
      <ul class="navbar-nav">
        <li><a href="{{ url_for('index') }}"
            class="nav-link {% if active_tab == 'home' %}active{% endif %}">Accuracy</a></li>
        <li><a href="{{ url_for('upload') }}"
            class="nav-link {% if active_tab == 'upload' %}active{% endif %}">Upload</a></li>
      </ul>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="page-shell">
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>

</html>
